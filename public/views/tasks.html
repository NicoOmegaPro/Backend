<div class="card">
    <div class="card-header">
        <h3 style="font-size: 1rem; font-weight: 600;">Listado de Tareas</h3>
        <button id="btn-create-task" class="btn btn-primary">+ Nueva Tarea</button>
    </div>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Estado</th>
                    <th>Prioridad</th>
                    <th>ID Proyecto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tasks-tbody">
                <!-- Data injected by JS -->
            </tbody>
        </table>
    </div>
    <div id="tasks-pagination" class="pagination-container"></div>
</div>

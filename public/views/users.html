<div class="card">
    <div class="card-header">
        <h3 style="font-size: 1rem; font-weight: 600;">Listado de Usuarios</h3>
        <button id="btn-create-user" class="btn btn-primary">+ Nuevo Usuario</button>
    </div>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <!-- Data injected by JS -->
            </tbody>
        </table>
    </div>
    <div id="users-pagination" class="pagination-container"></div>
</div>
